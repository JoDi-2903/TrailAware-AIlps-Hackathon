<!-- Transactional Screen - No Nav Shells rendered -->
<main class="flex-1 flex flex-col relative overflow-hidden">
<!-- Background Image Area with Gradient Overlay -->
<div class="absolute inset-0 success-bg" data-alt="A breathtaking, wide-angle photograph of the majestic Swiss Alps at sunrise, representing the serene and authoritative brand identity. The sky is clear, casting a warm, golden glow across the snow-capped peaks. The scene exudes calm confidence and high-end trekking reliability. Soft, ambient light highlights the rugged terrain, perfectly setting a feel-good mood for a high-quality modern interface.">
<!-- Gradient Overlay to ensure text readability -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/30 via-surface/80 to-surface"></div>
</div>
<!-- Content Canvas -->
<div class="relative z-10 flex-1 flex flex-col justify-center items-center px-margin-mobile pt-16 pb-8 md:px-margin-desktop max-w-lg mx-auto w-full text-center">

<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
</div>
</div>
<!-- Headline -->
<h1 class="font-display-lg text-display-lg text-primary mb-stack-md animate-in delay-100">
                Thank you for your contribution!
            </h1>
<!-- Subtext -->
<p class="font-body-lg text-body-lg text-on-surface-variant mb-stack-lg animate-in delay-200">
                Your report helps keep the Alpine community safe. We have notified the National Park authorities and shared the data with Komoot for hiker rerouting.
            </p>
<!-- Impact Score Widget (Bento Style) -->

<div class="flex items-center gap-stack-md">

</div>
</div>
