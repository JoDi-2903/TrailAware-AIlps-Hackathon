<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>AI Camera Reporter - TrailAware Alps</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "secondary": "#386471",
                        "on-surface": "#1a1c1a",
                        "surface-container": "#eeeeeb",
                        "tertiary-container": "#373b4c",
                        "inverse-surface": "#2f312f",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9faf6",
                        "surface-tint": "#3f6653",
                        "secondary-fixed-dim": "#a1cedc",
                        "on-surface-variant": "#414844",
                        "inverse-primary": "#a5d0b9",
                        "outline-variant": "#c1c8c2",
                        "surface-dim": "#dadad7",
                        "on-background": "#1a1c1a",
                        "outline": "#717973",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e2e3e0",
                        "primary": "#012d1d",
                        "on-tertiary-container": "#a2a5ba",
                        "surface": "#f9faf6",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#274e3d",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#bceaf9",
                        "surface-container-low": "#f3f4f1",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#c2c5db",
                        "surface-variant": "#e2e3e0",
                        "primary-container": "#1b4332",
                        "tertiary": "#212536",
                        "primary-fixed": "#c1ecd4",
                        "primary-fixed-dim": "#a5d0b9",
                        "on-tertiary-fixed-variant": "#424658",
                        "on-secondary-fixed": "#001f27",
                        "on-secondary-fixed-variant": "#1e4c59",
                        "on-tertiary-fixed": "#171b2b",
                        "on-secondary-container": "#3f6b78",
                        "inverse-on-surface": "#f0f1ee",
                        "surface-container-high": "#e8e8e5",
                        "background": "#f9faf6",
                        "on-primary-container": "#86af99",
                        "on-primary-fixed": "#002114",
                        "tertiary-fixed": "#dee1f8",
                        "secondary-container": "#bceaf9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "4px",
                        "stack-lg": "24px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "gutter": "16px",
                        "stack-md": "12px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-md-mobile": ["Inter"],
                        "body-sm": ["Inter"],
                        "display-lg": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "22px", "letterSpacing": "-0.41px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "600"}],
                        "headline-md-mobile": ["20px", {"lineHeight": "25px", "fontWeight": "600"}],
                        "body-sm": ["15px", {"lineHeight": "20px", "fontWeight": "400"}],

                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.06em", "fontWeight": "600"}]
                    }
                }
            }
        }

<style>
        .glass-panel {
            background: rgba(249, 250, 246, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .dark .glass-panel {
            background: rgba(47, 49, 47, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ar-bounding-box {
            position: absolute;
            top: 30%;
            left: 20%;
            width: 60%;
            height: 40%;
            border: 2px dashed #ffb4a9; /* Custom hazard color based on error-container vibes */
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(186, 26, 26, 0.3);
            animation: pulse-border 2s infinite;
        }

        .ar-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #ba1a1a; /* Error color for hazard */
        }
        .ar-corner-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .ar-corner-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .ar-corner-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .ar-corner-br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

        @keyframes pulse-border {
            0% { border-color: rgba(255, 180, 169, 0.5); }
            50% { border-color: rgba(255, 180, 169, 1); }
            100% { border-color: rgba(255, 180, 169, 0.5); }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ba1a1a, transparent);
            top: 0;
            animation: scan 3s linear infinite;
            box-shadow: 0 0 10px #ba1a1a;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .detecting-label {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-surface h-screen w-full overflow-hidden relative font-body-lg">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 w-full h-full bg-cover bg-center" data-alt="A first-person perspective live camera view of a dense, misty alpine forest trail. A large, thick fallen pine tree blocks the hiking path directly ahead. The lighting is overcast and slightly moody, typical of a high-altitude mountain environment. The scene feels realistic, like a smartphone camera view, capturing the rugged terrain and natural obstacle in sharp detail." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDF5sEq3PczESsNLb_9xmFVsnOZzmko0PN4wz69Z-tkoCXr2ZJ80LxXnwfzptgCivBdunFp2CU9jlOuziPLx-o7mMua758RbUKJEw_1AgM9VysGV36PrIkTArVVLSF7R8-G2GbW5j-6ve_vzdIZYt93-8HxP1fPkfS9SzqyXHzHvBznkCVNP3rFkiHtCb4DMGHnPmEN9gKzErVz0MZ8Q1VoRYvatETXecBaKPZECIc6kG3HFpBBz_t86klXnw4d_vx3mHBathfKwcc');"></div>
<!-- Overlay Gradient for Readability -->
<div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-black/70"></div>
<!-- Top Navigation / Actions (Contextual Task - No Main Nav Shell) -->
<div class="absolute top-0 w-full pt-safe px-margin-mobile pt-4 flex justify-between items-center z-50">
<button aria-label="Close Camera" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-error animate-pulse"></div>
<span class="font-label-caps text-label-caps text-white">Live Scan</span>
</div>
<button aria-label="Settings" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
<!-- AR Bounding Box & Feedback -->
<div class="ar-bounding-box z-40">
<div class="ar-corner ar-corner-tl"></div>
<div class="ar-corner ar-corner-tr"></div>
<div class="ar-corner ar-corner-bl"></div>
<div class="ar-corner ar-corner-br"></div>
<div class="scan-line"></div>
<!-- Floating Label -->
<div class="detecting-label glass-panel rounded-xl px-4 py-2 flex items-center gap-2 shadow-lg transition-all duration-300" id="status-label">
<span class="material-symbols-outlined text-error animate-spin" data-icon="radar" id="status-icon" style="font-variation-settings: 'FILL' 1;">radar</span>
<span class="font-body-sm text-body-sm text-on-surface font-semibold" id="status-text">AI Detecting...</span>
</div>
</div>
<!-- Crosshair Center -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-white/50 z-30 pointer-events-none">
<span class="material-symbols-outlined" data-icon="add" style="font-size: 48px; font-weight: 100;">add</span>
</div>
<!-- Bottom Controls Area -->
<div class="absolute bottom-0 w-full pb-safe z-50 flex flex-col items-center justify-end px-margin-mobile pb-8 bg-gradient-to-t from-black/80 to-transparent pt-20">
<!-- Flash & Reticle Controls -->
<div class="flex justify-between w-full max-w-sm mb-8 px-8">
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</button>
<button class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="center_focus_strong">center_focus_strong</span>
</button>
</div>
<!-- Main Capture Button -->
<button class="relative w-20 h-20 rounded-full border-4 border-white/50 flex items-center justify-center active:scale-90 transition-transform group">
<div class="w-16 h-16 rounded-full bg-white group-active:bg-surface-dim transition-colors flex items-center justify-center shadow-[0_8px_24px_rgba(27,67,50,0.3)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="camera_alt" style="font-variation-settings: 'FILL' 1;">camera_alt</span>
</div>
</button>
<p class="font-body-sm text-body-sm text-white/80 mt-4 text-center">Center object in frame to scan</p>
</div>
<script>
        // Simulate AI detection process
        setTimeout(() => {
            const statusIcon = document.getElementById('status-icon');
            const statusText = document.getElementById('status-text');
            const statusLabel = document.getElementById('status-label');
            
            // Remove spin, change icon and text
            statusIcon.classList.remove('animate-spin');
            statusIcon.textContent = 'warning';
            statusIcon.setAttribute('data-icon', 'warning');
            
            statusText.textContent = 'Hazard: Fallen Tree | Priority: Medium';
            
            // Adjust styling to indicate detection
            statusLabel.style.borderColor = '#ba1a1a'; // error color
            statusLabel.style.backgroundColor = 'rgba(255, 218, 214, 0.9)'; // error-container color with opacity
            statusText.classList.replace('text-on-surface', 'text-on-error-container');
            
        }, 3000); // 3 seconds detection simulation
    </script>
</body></html>
