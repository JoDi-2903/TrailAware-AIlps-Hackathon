name: trail_aware_ailps
description: AI-powered alpine trail hazard reporting for EUSALP Alpine AI-Hackathon 2026
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.11.0+2

  # Geolocation
  geolocator: ^14.0.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.9.2

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.1.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Permissions
  permission_handler: ^11.3.1

  # Image processing
  image: ^4.2.0

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.0.2

  # Utilities
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - .env
